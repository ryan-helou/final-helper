<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Helper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --cream: #f5f0e8;
  --cream-dark: #ebe4d6;
  --ink: #2c2825;
  --ink-light: #6b6460;
  --ink-faint: #9e9590;
  --terracotta: #c4654a;
  --terracotta-light: #d4846e;
  --terracotta-bg: #fdf0ec;
  --sage: #7a9e7e;
  --sage-light: #a8c5ab;
  --sage-bg: #eef4ee;
  --warm-white: #faf8f4;
  --border: #d9d0c3;
  --shadow: rgba(44, 40, 37, 0.08);
  --red: #c4654a;
  --amber: #c49a4a;
  --amber-bg: #fdf6ec;
  --blue: #4a7ec4;
  --blue-bg: #ecf2fd;
}

html { font-size: 16px; }

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  opacity: 0.025;
  pointer-events: none;
  z-index: 9999;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px;
}

/* ── Header ── */
.header {
  padding: 2.5rem 2rem 0.5rem;
  max-width: 1200px;
  margin: 0 auto;
}

.header h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 2.6rem;
  font-weight: 400;
  letter-spacing: -0.02em;
  line-height: 1.1;
}

.header-row {
  display: flex;
  align-items: baseline;
  gap: 1.2rem;
  flex-wrap: wrap;
  margin-top: 0.35rem;
}

.header .date {
  font-size: 0.82rem;
  color: var(--ink-light);
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.header .motivator {
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  color: var(--terracotta);
  font-size: 0.95rem;
  opacity: 0;
  animation: fadeIn 0.6s ease 0.3s forwards;
}

/* ── Status Banner ── */
.status-banner {
  max-width: 1200px;
  margin: 1rem auto 0;
  padding: 0 2rem;
}

.status-inner {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
}

.status-pill {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.5rem 1rem;
  border-radius: 99px;
  font-size: 0.82rem;
  font-weight: 600;
  border: 1.5px solid;
}

.status-pill.on-track { background: var(--sage-bg); border-color: var(--sage-light); color: #4a7a4e; }
.status-pill.behind { background: var(--terracotta-bg); border-color: var(--terracotta-light); color: var(--terracotta); }
.status-pill.ahead { background: var(--blue-bg); border-color: #a0bfe0; color: var(--blue); }

.status-pill .dot {
  width: 8px; height: 8px; border-radius: 50%;
}
.status-pill.on-track .dot { background: var(--sage); }
.status-pill.behind .dot { background: var(--terracotta); animation: pulse 1.5s infinite; }
.status-pill.ahead .dot { background: var(--blue); }

.exam-pills {
  display: flex;
  gap: 0.6rem;
  flex-wrap: wrap;
  margin-left: auto;
}

.exam-pill {
  font-size: 0.75rem;
  font-weight: 600;
  padding: 0.4rem 0.8rem;
  border-radius: 99px;
  background: var(--warm-white);
  border: 1.5px solid var(--border);
  color: var(--ink-light);
}

.exam-pill.imminent {
  background: var(--terracotta-bg);
  border-color: var(--terracotta-light);
  color: var(--terracotta);
}

.exam-pill.done-exam {
  background: var(--sage-bg);
  border-color: var(--sage-light);
  color: var(--sage);
  text-decoration: line-through;
  opacity: 0.7;
}

/* ── Layout ── */
.main-grid {
  max-width: 1200px;
  margin: 1.2rem auto 0;
  padding: 0 2rem 4rem;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
  align-items: start;
}

.left-col, .right-col {
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}

/* ── Cards ── */
.card {
  background: var(--warm-white);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.5rem;
  box-shadow: 0 2px 12px var(--shadow), 0 1px 3px var(--shadow);
  opacity: 0;
  animation: fadeSlideIn 0.5s ease forwards;
}

.card.delay-1 { animation-delay: 0.05s; }
.card.delay-2 { animation-delay: 0.1s; }
.card.delay-3 { animation-delay: 0.15s; }
.card.delay-4 { animation-delay: 0.2s; }

.card-label {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-faint);
  margin-bottom: 0.6rem;
}

.card-title {
  font-family: 'DM Serif Display', serif;
  font-size: 1.35rem;
  font-weight: 400;
  margin-bottom: 0.1rem;
}

/* ── Day Plan Card ── */
.day-plan-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
}

.day-number {
  font-size: 0.72rem;
  font-weight: 700;
  background: var(--cream-dark);
  color: var(--ink-light);
  padding: 0.2rem 0.65rem;
  border-radius: 99px;
}

.day-number.exam-day {
  background: var(--terracotta);
  color: white;
}

.study-block {
  padding: 0.9rem 1rem;
  border-radius: 12px;
  margin-bottom: 0.6rem;
  border-left: 4px solid;
}

.study-block.elec { border-color: #e74c3c; background: #fef5f4; }
.study-block.comp352 { border-color: #e67e22; background: #fef8f2; }
.study-block.comp335 { border-color: #9b59b6; background: #f9f4fc; }
.study-block.engr { border-color: #f1c40f; background: #fefcf2; }

.study-block-title {
  font-weight: 700;
  font-size: 0.85rem;
  margin-bottom: 0.15rem;
}

.study-block-time {
  font-size: 0.72rem;
  color: var(--ink-faint);
  font-weight: 600;
  margin-bottom: 0.3rem;
}

.study-block-topic {
  font-size: 0.82rem;
  color: var(--ink-light);
}

.study-block-goals {
  font-size: 0.78rem;
  color: var(--ink-faint);
  margin-top: 0.2rem;
  font-style: italic;
}

.day-note {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--terracotta);
  background: var(--terracotta-bg);
  padding: 0.5rem 0.8rem;
  border-radius: 8px;
  margin-top: 0.3rem;
}

.study-task-list {
  margin-top: 0.5rem;
  display: flex;
  flex-direction: column;
  gap: 0.15rem;
}

.study-task {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.3rem 0.2rem;
  border-radius: 6px;
  transition: background 0.15s;
}

.study-task:hover { background: rgba(0,0,0,0.03); }

.study-task .cb {
  width: 16px; height: 16px;
  border-width: 1.5px;
  border-radius: 4px;
}

.study-task-text {
  font-size: 0.8rem;
  color: var(--ink);
}

.study-task-text.done {
  text-decoration: line-through;
  color: var(--ink-faint);
  opacity: 0.6;
}

.study-block-progress {
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--sage);
  margin-left: auto;
  white-space: nowrap;
}

.no-plan {
  text-align: center;
  padding: 1.5rem;
  color: var(--ink-faint);
  font-style: italic;
  font-size: 0.85rem;
}

/* ── Day Navigator ── */
.day-nav {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  margin-bottom: 0.8rem;
}

.day-nav-btn {
  width: 32px; height: 32px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  background: var(--warm-white);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8rem;
  color: var(--ink-light);
  transition: all 0.15s;
  flex-shrink: 0;
}

.day-nav-btn:hover { background: var(--cream-dark); color: var(--ink); }
.day-nav-btn:disabled { opacity: 0.3; cursor: default; }
.day-nav-btn:disabled:hover { background: var(--warm-white); color: var(--ink-light); }

.day-nav-today {
  font-size: 0.72rem;
  font-weight: 700;
  padding: 0.3rem 0.7rem;
  border: 1.5px solid var(--terracotta-light);
  border-radius: 8px;
  background: var(--terracotta-bg);
  color: var(--terracotta);
  cursor: pointer;
  transition: all 0.15s;
}

.day-nav-today:hover { background: var(--terracotta); color: white; }

.day-nav-label {
  flex: 1;
  text-align: center;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--ink-light);
}

.day-nav-dots {
  display: flex;
  gap: 3px;
  justify-content: center;
  flex-wrap: wrap;
  max-width: 280px;
  margin: 0 auto;
}

.day-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--cream-dark);
  cursor: pointer;
  transition: all 0.15s;
  border: 1.5px solid transparent;
}

.day-dot:hover { background: var(--border); transform: scale(1.3); }
.day-dot.current { background: var(--terracotta); border-color: var(--terracotta); transform: scale(1.3); }
.day-dot.completed { background: var(--sage-light); }
.day-dot.past { background: var(--border); }
.day-dot.exam { background: var(--terracotta-light); border-radius: 2px; }

/* ── Checklist Card ── */
.subject-section {
  margin-bottom: 1rem;
}

.subject-header-row {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.55rem 0.7rem;
  border-radius: 10px;
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
}

.subject-header-row:hover { background: var(--cream); }

.subject-chevron {
  font-size: 0.6rem;
  color: var(--ink-faint);
  transition: transform 0.2s;
  flex-shrink: 0;
}
.subject-chevron.open { transform: rotate(90deg); }

.subject-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.subject-dot.elec { background: #e74c3c; }
.subject-dot.comp352 { background: #e67e22; }
.subject-dot.comp335 { background: #9b59b6; }
.subject-dot.engr { background: #f1c40f; }

.subject-label {
  font-weight: 700;
  font-size: 0.88rem;
  flex: 1;
}

.subject-pct {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--ink-faint);
}

.subject-bar-wrap {
  width: 60px; height: 5px;
  background: var(--cream-dark);
  border-radius: 99px;
  overflow: hidden;
}

.subject-bar-fill {
  height: 100%;
  border-radius: 99px;
  transition: width 0.4s ease;
}

.subject-bar-fill.elec { background: #e74c3c; }
.subject-bar-fill.comp352 { background: #e67e22; }
.subject-bar-fill.comp335 { background: #9b59b6; }
.subject-bar-fill.engr { background: #f1c40f; }

.subject-topics {
  display: none;
  padding: 0.2rem 0 0.2rem 1.6rem;
}
.subject-topics.open { display: block; }

.topic-group-title {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--ink-faint);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin: 0.7rem 0 0.3rem;
}

.topic-group-title:first-child { margin-top: 0.3rem; }

.topic-item {
  display: flex;
  align-items: center;
  gap: 0.55rem;
  padding: 0.35rem 0.4rem;
  border-radius: 8px;
  transition: background 0.15s;
}

.topic-item:hover { background: var(--cream); }

.cb {
  width: 17px; height: 17px;
  border: 2px solid var(--border);
  border-radius: 5px;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
  display: flex;
  align-items: center;
  justify-content: center;
}

.cb:hover { border-color: var(--terracotta-light); }

.cb.checked {
  background: var(--sage);
  border-color: var(--sage);
}

.cb.checked::after {
  content: '';
  width: 5px; height: 9px;
  border: 2px solid white;
  border-top: none; border-left: none;
  transform: rotate(45deg) translate(-1px,-1px);
  animation: checkPop 0.2s ease;
}

.topic-text {
  font-size: 0.82rem;
  flex: 1;
  word-break: break-word;
}

.topic-text.done {
  text-decoration: line-through;
  color: var(--ink-faint);
  opacity: 0.6;
}

/* ── Overall Progress ── */
.overall-progress {
  margin-bottom: 1rem;
}

.overall-bar {
  height: 8px;
  background: var(--cream-dark);
  border-radius: 99px;
  overflow: hidden;
  margin-top: 0.4rem;
}

.overall-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--sage), var(--sage-light));
  border-radius: 99px;
  transition: width 0.5s ease;
}

.overall-stats {
  display: flex;
  justify-content: space-between;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--ink-light);
}

/* ── Tab switcher ── */
.tab-row {
  display: flex;
  gap: 0.3rem;
  margin-bottom: 1rem;
  background: var(--cream);
  padding: 0.25rem;
  border-radius: 10px;
}

.tab-btn {
  flex: 1;
  padding: 0.45rem 0.6rem;
  border: none;
  border-radius: 8px;
  font-family: inherit;
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  background: transparent;
  color: var(--ink-light);
  transition: all 0.2s;
}

.tab-btn.active {
  background: var(--warm-white);
  color: var(--ink);
  box-shadow: 0 1px 4px var(--shadow);
}

/* ── Animations ── */
@keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
@keyframes fadeSlideIn { from { opacity: 0; transform: translateY(10px) } to { opacity: 1; transform: translateY(0) } }
@keyframes checkPop { 0% { transform: rotate(45deg) translate(-1px,-1px) scale(0) } 60% { transform: rotate(45deg) translate(-1px,-1px) scale(1.2) } 100% { transform: rotate(45deg) translate(-1px,-1px) scale(1) } }
@keyframes pulse { 0%, 100% { opacity: 1 } 50% { opacity: 0.4 } }

/* ── Responsive ── */
@media (max-width: 800px) {
  .main-grid { grid-template-columns: 1fr; padding: 0 1.2rem 3rem; }
  .header { padding: 2rem 1.2rem 0.5rem; }
  .header h1 { font-size: 2rem; }
  .status-banner { padding: 0 1.2rem; }
  .status-inner { flex-direction: column; gap: 0.5rem; }
  .exam-pills { margin-left: 0; }
}
</style>
</head>
<body>

<header class="header">

  </div>
</header>

<div class="status-banner" id="statusBanner"></div>

<main class="main-grid">
  <div class="left-col">
    <section class="card delay-1" id="dayViewCard"></section>
  </div>
  <div class="right-col">
    <section class="card delay-3" id="checklistCard"></section>
  </div>
</main>

  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function tomorrow() {
  const d = new Date();
  d.setDate(d.getDate() + 1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function daysBetween(a, b) {
  return Math.round((new Date(b) - new Date(a)) / 86400000);
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function topicKey(course, groupIdx, itemIdx) {
  return `${course}:${groupIdx}:${itemIdx}`;
}

function getSubjectStats(courseName) {
  const course = CHECKLIST[courseName];
  let total = 0, done = 0;
  course.groups.forEach((g, gi) => {
    g.items.forEach((_, ii) => {
      total++;
      if (checkedTopics[topicKey(courseName, gi, ii)]) done++;
    });
  });
  return { total, done };
}

function getPlanForDate(dateStr) {
  return PLAN.find(p => p.date === dateStr);
}

function getStudyDayNumber() {
  const t = today();
  const plan = getPlanForDate(t);
  if (plan) return plan.day;
  // If between plan dates, find the last day that has passed
  for (let i = PLAN.length - 1; i >= 0; i--) {
    if (PLAN[i].date <= t) return PLAN[i].day;
  }
  return 0;
}

function getScheduleStatus() {
  const t = today();
  const currentDayNum = getStudyDayNumber();
  // Count how many past days are marked complete
  let shouldHaveCompleted = 0;
  let actuallyCompleted = 0;
  for (const p of PLAN) {
    if (p.date < t) {
      shouldHaveCompleted++;
      if (completedDays[p.date]) actuallyCompleted++;
    }
  }
  const diff = actuallyCompleted - shouldHaveCompleted;
  if (shouldHaveCompleted === 0) return { status: 'on-track', diff: 0, completed: 0, expected: 0 };
  if (diff >= 0) {
    return actuallyCompleted > shouldHaveCompleted
      ? { status: 'ahead', diff, completed: actuallyCompleted, expected: shouldHaveCompleted }
      : { status: 'on-track', diff: 0, completed: actuallyCompleted, expected: shouldHaveCompleted };
  }
  return { status: 'behind', diff, completed: actuallyCompleted, expected: shouldHaveCompleted };
}

// ═══════════════════════════════════════════════════════
// RENDER: Header
// ═══════════════════════════════════════════════════════
const motivators = [
  "You've got this — one task at a time.",
  "Small progress is still progress.",
  "Focus on what matters most today.",
  "Discipline today, freedom tomorrow.",
  "You're closer than you think.",
  "Today's effort is tomorrow's relief.",
  "Done is better than perfect.",
  "Trust the process.",
  "Every checked box counts.",
  "Finals won't know what hit them.",
];

document.getElementById('dateDisplay').textContent = new Date().toLocaleDateString('en-US', {
  weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
});
document.getElementById('motivator').textContent = motivators[Math.floor(Math.random() * motivators.length)];

// ═══════════════════════════════════════════════════════
// RENDER: Status Banner
// ═══════════════════════════════════════════════════════
function renderStatusBanner() {
  const t = today();
  const { status, diff, completed, expected } = getScheduleStatus();

  let statusHTML = '';
  if (status === 'on-track') {
    statusHTML = `<div class="status-pill on-track"><span class="dot"></span> On track — ${completed}/${expected} days completed</div>`;
  } else if (status === 'behind') {
    statusHTML = `<div class="status-pill behind"><span class="dot"></span> ${Math.abs(diff)} day${Math.abs(diff)>1?'s':''} behind — ${completed}/${expected} completed</div>`;
  } else {
    statusHTML = `<div class="status-pill ahead"><span class="dot"></span> ${diff} day${diff>1?'s':''} ahead!</div>`;
  }

  let examHTML = EXAMS.map(e => {
    const d = daysBetween(t, e.date);
    if (d < 0) return `<span class="exam-pill done-exam">${e.course} — done</span>`;
    if (d === 0) return `<span class="exam-pill imminent">${e.course} — TODAY</span>`;
    if (d <= 3) return `<span class="exam-pill imminent">${e.course} — ${d}d left</span>`;
    return `<span class="exam-pill">${e.course} — ${d}d</span>`;
  }).join('');

  document.getElementById('statusBanner').innerHTML = `
    <div class="status-inner">
      ${statusHTML}
      <div class="exam-pills">${examHTML}</div>
    </div>
  `;
}

// ═══════════════════════════════════════════════════════
// RENDER: Day Plan Card (navigable)
// ═══════════════════════════════════════════════════════
let currentViewIndex = PLAN.findIndex(p => p.date === today());
if (currentViewIndex === -1) {
  // Find nearest future day or last day
  currentViewIndex = PLAN.findIndex(p => p.date >= today());
  if (currentViewIndex === -1) currentViewIndex = PLAN.length - 1;
}

function navigateDay(delta) {
  currentViewIndex = Math.max(0, Math.min(PLAN.length - 1, currentViewIndex + delta));
  renderDayView();
}

function jumpToDay(idx) {
  currentViewIndex = idx;
  renderDayView();
}

function jumpToToday() {
  const idx = PLAN.findIndex(p => p.date === today());
  if (idx !== -1) { currentViewIndex = idx; renderDayView(); }
}

function renderDayPlanContent(plan, dateStr) {
  const isToday = dateStr === today();
  const isTmrw = dateStr === tomorrow();
  const isPast = dateStr < today();
  const isDone = completedDays[dateStr];
  const isExamDay = plan.note && plan.note.includes('EXAM TODAY');

  let tagHTML = '';
  if (isToday) tagHTML = '<span style="font-size:0.7rem;font-weight:700;background:var(--terracotta);color:white;padding:0.15rem 0.5rem;border-radius:99px;margin-left:0.5rem;">TODAY</span>';
  else if (isTmrw) tagHTML = '<span style="font-size:0.7rem;font-weight:700;background:var(--blue);color:white;padding:0.15rem 0.5rem;border-radius:99px;margin-left:0.5rem;">TOMORROW</span>';
  else if (isPast && isDone) tagHTML = '<span style="font-size:0.7rem;font-weight:700;background:var(--sage);color:white;padding:0.15rem 0.5rem;border-radius:99px;margin-left:0.5rem;">DONE</span>';
  else if (isPast && !isDone) tagHTML = '<span style="font-size:0.7rem;font-weight:700;background:var(--terracotta-light);color:white;padding:0.15rem 0.5rem;border-radius:99px;margin-left:0.5rem;">MISSED</span>';

  let blocksHTML = plan.blocks.map((b, bi) => {
    // Build task list from topic + goals
    let tasks = [];
    if (b.topic) tasks.push(b.topic);
    if (b.goals) {
      b.goals.split(', ').forEach(g => {
        if (g && g !== b.topic) tasks.push(g);
      });
    }

    let tasksDone = 0;
    let tasksHTML = tasks.map((t, ti) => {
      const key = dayTaskKey(plan.day, bi, ti);
      const checked = checkedDayTasks[key];
      if (checked) tasksDone++;
      return `
        <div class="study-task">
          <div class="cb ${checked ? 'checked' : ''}" onclick="toggleDayTask('${key}')"></div>
          <span class="study-task-text ${checked ? 'done' : ''}">${esc(t)}</span>
        </div>
      `;
    }).join('');

    const progressText = tasks.length > 0 ? `${tasksDone}/${tasks.length}` : '';

    return `
      <div class="study-block ${b.cls}">
        <div style="display:flex;align-items:center;">
          <div style="flex:1;">
            <div class="study-block-title">${esc(b.course)}</div>
            ${b.sections ? `<div class="study-block-time">${esc(b.sections)}</div>` : ''}
          </div>
          ${progressText ? `<span class="study-block-progress">${tasksDone === tasks.length && tasks.length > 0 ? '&#10003; ' : ''}${progressText}</span>` : ''}
        </div>
        <div class="study-task-list">${tasksHTML}</div>
      </div>
    `;
  }).join('');

  // Check if all tasks for this day are done
  let allDayTasks = 0, allDayDone = 0;
  plan.blocks.forEach((b, bi) => {
    let tasks = [];
    if (b.topic) tasks.push(b.topic);
    if (b.goals) b.goals.split(', ').forEach(g => { if (g && g !== b.topic) tasks.push(g); });
    tasks.forEach((_, ti) => {
      allDayTasks++;
      if (checkedDayTasks[dayTaskKey(plan.day, bi, ti)]) allDayDone++;
    });
  });

  let noteHTML = plan.note ? `<div class="day-note">${esc(plan.note)}</div>` : '';

  let markDoneHTML = '';
  const autoComplete = allDayTasks > 0 && allDayDone === allDayTasks;
  if (autoComplete && !isDone) {
    // Auto-mark complete if all tasks checked
    completedDays[dateStr] = true;
    saveCompletedDays();
    markDoneHTML = `<button class="btn" style="margin-top:0.8rem;width:100%;background:var(--sage-bg);color:var(--sage);cursor:pointer;border:1.5px solid var(--sage-light);" onclick="unmarkDayDone('${dateStr}')">All done! (undo)</button>`;
  } else if ((isToday || isPast) && !isDone) {
    markDoneHTML = `<button class="btn btn-sage" style="margin-top:0.8rem;width:100%;" onclick="markDayDone('${dateStr}')">Mark as completed</button>`;
  } else if (isDone) {
    markDoneHTML = `<button class="btn" style="margin-top:0.8rem;width:100%;background:var(--cream);color:var(--ink-light);cursor:pointer;" onclick="unmarkDayDone('${dateStr}')">Undo completed</button>`;
  }

  return `
    <div class="day-plan-header">
      <h3 class="card-title">${esc(plan.label)}${tagHTML}</h3>
      <span class="day-number ${isExamDay ? 'exam-day' : ''}">Day ${plan.day}</span>
    </div>
    ${noteHTML}
    ${blocksHTML}
    ${markDoneHTML}
  `;
}

function renderDayView() {
  const el = document.getElementById('dayViewCard');
  const plan = PLAN[currentViewIndex];
  const t = today();
  const isViewingToday = plan.date === t;

  // Day dot navigation
  let dotsHTML = PLAN.map((p, i) => {
    let cls = 'day-dot';
    if (i === currentViewIndex) cls += ' current';
    else if (completedDays[p.date]) cls += ' completed';
    else if (p.date < t) cls += ' past';
    // Mark exam days
    if (p.note && p.note.includes('EXAM TODAY')) cls += ' exam';
    return `<div class="${cls}" onclick="jumpToDay(${i})" title="Day ${p.day}: ${p.label}"></div>`;
  }).join('');

  let navHTML = `
    <div class="day-nav">
      <button class="day-nav-btn" onclick="navigateDay(-1)" ${currentViewIndex === 0 ? 'disabled' : ''}>◀</button>
      ${!isViewingToday ? `<button class="day-nav-today" onclick="jumpToToday()">Today</button>` : ''}
      <span class="day-nav-label">Day ${plan.day} of ${PLAN.length}</span>
      <button class="day-nav-btn" onclick="navigateDay(1)" ${currentViewIndex === PLAN.length-1 ? 'disabled' : ''}>▶</button>
    </div>
    <div class="day-nav-dots">${dotsHTML}</div>
  `;

  el.innerHTML = `
    <div class="card-label">Study Plan</div>
    ${navHTML}
    ${renderDayPlanContent(plan, plan.date)}
  `;
}

function markDayDone(dateStr) {
  completedDays[dateStr] = true;
  saveCompletedDays();
  renderDayView();
  renderStatusBanner();
}

function unmarkDayDone(dateStr) {
  delete completedDays[dateStr];
  saveCompletedDays();
  renderDayView();
  renderStatusBanner();
}

// ═══════════════════════════════════════════════════════
// RENDER: Checklist Card
// ═══════════════════════════════════════════════════════
function renderChecklist() {
  const el = document.getElementById('checklistCard');

  // Overall stats
  let totalAll = 0, doneAll = 0;
  Object.keys(CHECKLIST).forEach(c => {
    const s = getSubjectStats(c);
    totalAll += s.total;
    doneAll += s.done;
  });
  const pctAll = totalAll > 0 ? Math.round((doneAll / totalAll) * 100) : 0;

  let subjectsHTML = Object.keys(CHECKLIST).map(courseName => {
    const course = CHECKLIST[courseName];
    const stats = getSubjectStats(courseName);
    const pct = stats.total > 0 ? Math.round((stats.done / stats.total) * 100) : 0;
    const isOpen = openSubjects[courseName] === true;

    let groupsHTML = course.groups.map((g, gi) => {
      let itemsHTML = g.items.map((item, ii) => {
        const key = topicKey(courseName, gi, ii);
        const checked = checkedTopics[key];
        return `
          <div class="topic-item">
            <div class="cb ${checked ? 'checked' : ''}" onclick="toggleTopic('${key}')"></div>
            <span class="topic-text ${checked ? 'done' : ''}">${esc(item)}</span>
          </div>
        `;
      }).join('');
      return `<div class="topic-group-title">${esc(g.title)}</div>${itemsHTML}`;
    }).join('');

    return `
      <div class="subject-section">
        <div class="subject-header-row" onclick="toggleSubject('${courseName}')">
          <span class="subject-chevron ${isOpen ? 'open' : ''}">▶</span>
          <span class="subject-dot ${course.cls}"></span>
          <span class="subject-label">${esc(courseName)}</span>
          <span class="subject-pct">${pct}%</span>
          <div class="subject-bar-wrap">
            <div class="subject-bar-fill ${course.cls}" style="width:${pct}%"></div>
          </div>
        </div>
        <div class="subject-topics ${isOpen ? 'open' : ''}">
          ${groupsHTML}
        </div>
      </div>
    `;
  }).join('');

  el.innerHTML = `
    <div class="card-label">Topic Checklist</div>
    <h3 class="card-title" style="margin-bottom:0.8rem;">Finals Progress</h3>
    <div class="overall-progress">
      <div class="overall-stats">
        <span>${doneAll} of ${totalAll} topics covered</span>
        <span>${pctAll}%</span>
      </div>
      <div class="overall-bar">
        <div class="overall-fill" style="width:${pctAll}%"></div>
      </div>
    </div>
    ${subjectsHTML}
  `;
}

function toggleTopic(key) {
  checkedTopics[key] = !checkedTopics[key];
  if (!checkedTopics[key]) delete checkedTopics[key];
  saveChecked();
  renderChecklist();
}

function toggleSubject(courseName) {
  openSubjects[courseName] = !openSubjects[courseName];
  saveOpenSubjects();
  renderChecklist();
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
renderStatusBanner();
renderDayView();
renderChecklist();

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowLeft') navigateDay(-1);
  if (e.key === 'ArrowRight') navigateDay(1);
});
</script>
